<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>순간이 억겁이 되는 일이었다</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        .video-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        video {
            width: 100vw;
            height: 100vh;
            object-fit: contain; /* 화면 크기에 맞춰 포스터가 잘리지 않게 설정 */
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="hologramVideo" src="motion-poster(M).mp4" preload="auto" muted playsinline></video>
    </div>

    <script>
        const video = document.getElementById('hologramVideo');
        const MAX_ANGLE = 30; // 자이로 감도
        let isInitialized = false;

        // [핵심] 화면 터치 시 가장 먼저 실행되는 함수
        function activateInteraction() {
            if (isInitialized) return;

            // 1. iOS 13+ 기기: 즉각적인 센서 권한 요청 (Promise나 setTimeout 안에 넣으면 절대 안 됨)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            isInitialized = true;
                            window.addEventListener('deviceorientation', handleOrientation);
                            unlockVideo(); // 권한 획득 후 비디오 잠금 해제
                        } else {
                            // 권한 거부 시 일반 재생
                            startFallbackLoop();
                        }
                    })
                    .catch(console.error);
            } else {
                // 2. 안드로이드 및 기타 환경 (권한 요청 불필요)
                isInitialized = true;
                window.addEventListener('deviceorientation', handleOrientation);
                unlockVideo();
            }

            // 터치 이벤트는 1회만 작동하도록 제거
            window.removeEventListener('click', activateInteraction);
            window.removeEventListener('touchstart', activateInteraction);
        }

        // 비디오를 모바일에서 제어할 수 있도록 한 번 깨우는(Unlock) 함수
        function unlockVideo() {
            video.play().then(() => {
                video.pause();
            }).catch(console.error);
        }

        // 센서 사용 불가 환경을 위한 기본 루프 재생
        function startFallbackLoop() {
            video.loop = true;
            video.play();
        }

        // 기기 기울기에 따라 영상 시간(Frame) 제어
        function handleOrientation(event) {
            let tiltX = event.gamma; // 좌우 기울기 (-90 ~ 90)

            if (tiltX === null) return;

            // 기울기 범위 제한 (-30 ~ 30)
            if (tiltX > MAX_ANGLE) tiltX = MAX_ANGLE;
            if (tiltX < -MAX_ANGLE) tiltX = -MAX_ANGLE;

            // -30~30을 0~1(0%~100%) 비율로 변환
            const percentage = (tiltX + MAX_ANGLE) / (MAX_ANGLE * 2);

            if (video.duration) {
                video.currentTime = percentage * video.duration;
            }
        }

        // 사용자가 화면 아무 곳이나 터치하면 권한 요청 및 인터랙션 시작
        window.addEventListener('click', activateInteraction);
        window.addEventListener('touchstart', activateInteraction);

        // 안드로이드 등은 터치 없이도 센서가 켜져있는지 확인 후 바로 시작 시도
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission !== 'function') {
                window.addEventListener('deviceorientation', handleOrientation);
                // 단, 비디오 스크러빙(currentTime)을 위해서는 여전히 첫 터치가 필요할 수 있습니다.
            }
        });
    </script>
</body>
</html>
